name: Tauri Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: ''
            args: ''
          - platform: ubuntu-22.04
            target: ''
            args: ''
          - platform: macos-latest   # ARM
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"

          - platform: macos-13       # Intel
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      # ------------------------
      # Checkout repo
      # ------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------
      # Node setup
      # ------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ------------------------
      # Install frontend deps
      # ------------------------
      - name: Install frontend dependencies
        run: npm install

      # ------------------------
      # Rust setup
      # ------------------------
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      # ------------------------
      # Linux dependencies
      # ------------------------
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # ------------------------
      # Build frontend
      # ------------------------
      - name: Build frontend
        run: npm run build

      # ------------------------
      # Build Tauri
      # ------------------------
      - name: Build Tauri app
        run: npm run tauri build -- ${{ matrix.args }}

      # ------------------------
      # Upload artifacts per platform
      # ------------------------
      # Windows
      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/setup.exe

      # Linux
      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

      # macOS ARM
      - name: Upload macOS ARM artifact
        if: matrix.platform == 'macos-latest' && matrix.target == 'aarch64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-macos-arm64
          path: src-tauri/target/release/bundle/dmg/*.dmg

      # macOS x64
      - name: Upload macOS x64 artifact
        if: matrix.platform == 'macos-latest' && matrix.target == 'x86_64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-macos-x64
          path: src-tauri/target/release/bundle/dmg/*.dmg