name: Tauri Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-arm64, macos-x64, ubuntu-22.04, windows-latest]

    runs-on: ${{ 
      matrix.platform == 'macos-arm64' || matrix.platform == 'macos-x64' 
        ? 'macos-latest' 
        : matrix.platform 
    }}

    steps:
      # ------------------------
      # Checkout
      # ------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------
      # Node
      # ------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install frontend dependencies
        run: npm install

      # ------------------------
      # Rust
      # ------------------------
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      # Add targets for macOS
      - name: Add Rust targets for macOS
        if: matrix.platform == 'macos-arm64'
        run: rustup target add aarch64-apple-darwin

      - name: Add Rust targets for macOS
        if: matrix.platform == 'macos-x64'
        run: rustup target add x86_64-apple-darwin

      # ------------------------
      # Linux dependencies
      # ------------------------
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # ------------------------
      # Build frontend
      # ------------------------
      - name: Build frontend
        run: npm run build

      # ------------------------
      # Build Tauri app
      # ------------------------
      - name: Build Tauri (macOS ARM64)
        if: matrix.platform == 'macos-arm64'
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Build Tauri (macOS x64)
        if: matrix.platform == 'macos-x64'
        run: npm run tauri build -- --target x86_64-apple-darwin

      - name: Build Tauri (Linux/Windows)
        if: matrix.platform != 'macos-arm64' && matrix.platform != 'macos-x64'
        run: npm run tauri build

      # ------------------------
      # Upload artifacts
      # ------------------------
      - name: Upload macOS ARM64 artifact
        if: matrix.platform == 'macos-arm64'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-macos-arm64
          path: src-tauri/target/release/bundle

      - name: Upload macOS x64 artifact
        if: matrix.platform == 'macos-x64'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-macos-x64
          path: src-tauri/target/release/bundle

      - name: Upload Linux artifact
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-linux
          path: src-tauri/target/release/bundle

      - name: Upload Windows artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-windows
          path: src-tauri/target/release/bundle